<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    body {
      margin: 0;
      background: #0b1220;
      color: #e2e8f0;
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top bar */
    #top {
      padding: 14px;
      background: #020617;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #1e293b;
    }

    #top input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      outline: none;
    }

    #top button {
      background: #3b82f6;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    #top button:hover {
      background: #2563eb;
    }

    /* Chat area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Message bubbles */
    .msg {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 65%;
      background: #1e293b;
      line-height: 1.4;
      font-size: 14px;
    }

    .msg img {
      margin-top: 6px;
      border-radius: 10px;
      max-width: 220px;
    }

    .me {
      align-self: flex-end;
      background: #2563eb;
      color: white;
    }

    /* Bottom bar */
    #bottom {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #020617;
      border-top: 1px solid #1e293b;
      gap: 10px;
    }

    /* Text input */
    #msg {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      background: #1e293b;
      color: white;
      outline: none;
      font-size: 14px;
    }

    /* File input hidden */
    #imageInput {
      display: none;
    }

    /* Icon buttons */
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: 0.2s;
    }

    /* Upload button */
    #uploadBtn {
      background: #0a0a0a;
      color: #2665b2;
    }

    #uploadBtn:hover {
      background: #0e0e0e;
    }

    /* Send button */
    #sendBtn {
      background: #22c55e;
      color: white;
    }

    #sendBtn:hover {
      background: #16a34a;
    }

    /* Scrollbar (optional polish) */
    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: #000000;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="top">
  <input id="room" placeholder="Enter room name...">
  <button id="joinBtn">Join</button>
</div>

<div id="messages"></div>

<div id="bottom">
  <label for="imageInput" class="icon-btn" style="cursor:pointer;">📎</label>
  <input type="file" id="imageInput" hidden>
  <input id="msg" placeholder="Type a message...">

  <button id="sendBtn" class="icon-btn">➤</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
console.log("JS LOADED");
window.onload = () => {

  const socket = io();

  const joinBtn = document.getElementById("joinBtn");
  const sendBtn = document.getElementById("sendBtn");
  const roomInput = document.getElementById("room");
  const msgInput = document.getElementById("msg");
  const messagesDiv = document.getElementById("messages");


  let currentRoom = "";

  function addMessage(text, isMe = false) {
    const div = document.createElement("div");
    div.className = "msg" + (isMe ? " me" : "");
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
  
  const imageInput = document.getElementById("imageInput");

console.log("imageInput found:", imageInput);

imageInput.addEventListener("change", async () => {
  console.log("CHANGE EVENT TRIGGERED");

  const file = imageInput.files[0];

  if (!file) {
    console.log("NO FILE SELECTED");
    return;
  }

  console.log("FILE:", file.name);

  const formData = new FormData();
  formData.append("image", file);

  try {
    console.log("SENDING REQUEST...");

    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });

    console.log("STATUS:", res.status);

    const data = await res.json();
    console.log("RESPONSE:", data);

    socket.emit("image", {
     url: data.url,
     sender: socket.id
    });

showImage(data.url, true);

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
  }
});

  function showImage(url, isMe = false) {
    const div = document.createElement("div");
    div.className = "msg" + (isMe ? " me" : "");

    const img = document.createElement("img");
    img.src = url;

    div.appendChild(img);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // JOIN
  joinBtn.onclick = () => {
    const room = roomInput.value.trim();
    if (!room) return alert("Enter room");

    currentRoom = room;
    messagesDiv.innerHTML = "";
    socket.emit("join", room);

    addMessage("🟢 Joined " + room);
  };

  // SEND TEXT
  sendBtn.onclick = () => {
    const msg = msgInput.value.trim();
    if (!msg) return;

    if (!currentRoom) return alert("Join room first");

    socket.emit("message", msg);
    addMessage(msg, true);
    msgInput.value = "";
  };

  msgInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendBtn.click();
  });


  // SOCKETS
  socket.on("message", (msg) => addMessage(msg));

  socket.on("image", (data) => {
   if (data.sender === socket.id) return; // ignore your own

   showImage(data.url);
  });

  socket.on("load", (messages) => {
    messagesDiv.innerHTML = "";
    messages.forEach(m => addMessage(m.text));
  });

  socket.on("full", () => {
    alert("Room full");
  });

  const ffmpeg = require("fluent-ffmpeg");
const path = require("path");

app.post("/upload-audio", upload.single("audio"), (req, res) => {
  if (!req.file) {
    return res.status(400).json({ error: "No audio uploaded" });
  }

  const inputPath = req.file.path;
  const outputFile = "compressed_" + Date.now() + ".mp3";
  const outputPath = path.join("uploads", outputFile);

  ffmpeg(inputPath)
    .audioBitrate(64)
    .save(outputPath)
    .on("end", () => {
      res.json({
        url: "/uploads/" + outputFile
      });
    })
    .on("error", (err) => {
      console.error("FFmpeg error:", err);
      res.status(500).json({ error: "Compression failed" });
    });
});



};
</script>

</body>
</html>
